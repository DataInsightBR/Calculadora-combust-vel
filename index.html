<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Combustível</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 320px;
    }

    h1 {
      text-align: center;
      font-size: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .resultado {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
    }

    .etanol {
      background: #d4edda;
      color: #155724;
    }

    .gasolina {
      background: #f8d7da;
      color: #721c24;
    }

    .info {
      margin-top: 15px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Etanol ou Gasolina?</h1>

  <label>Preço do Etanol (R$)</label>
  <input type="number" id="etanol" placeholder="Ex: 3.50" step="0.01">

  <label>Preço da Gasolina (R$)</label>
  <input type="number" id="gasolina" placeholder="Ex: 5.00" step="0.01">

  <button onclick="calcular()">Calcular</button>

  <div id="resultado"></div>

  <div class="info">
    Regra dos 70%: se o etanol custar até 70% do valor da gasolina, compensa.
  </div>
</div>

<script>
  function calcular() {
    const etanol = parseFloat(document.getElementById('etanol').value);
    const gasolina = parseFloat(document.getElementById('gasolina').value);
    const resultadoDiv = document.getElementById('resultado');

    if (isNaN(etanol) || isNaN(gasolina) || gasolina === 0) {
      resultadoDiv.innerHTML = "<div class='resultado'>Preencha os valores corretamente.</div>";
      return;
    }

    const resultado = etanol / gasolina;

    if (resultado <= 0.7) {
      resultadoDiv.innerHTML = `<div class="resultado etanol">
        Resultado: ${resultado.toFixed(2)} <br>
        ✔ Vale mais a pena usar ETANOL
      </div>`;
    } else {
      resultadoDiv.innerHTML = `<div class="resultado gasolina">
        Resultado: ${resultado.toFixed(2)} <br>
        ✔ Vale mais a pena usar GASOLINA
      </div>`;
    }
  }
</script>

</body>
</html>
